# Introduction to Hypothesis Testing

---




### Introduction to Hypothesis Testing

--

A statistical hypothesis is often a statement about one or more population parameters.

--

&gt; The **null hypothesis** *(denoted by Ho)* about a parameter states that the parameter is **equal** to a specific value, for example, Ho: `\(\mu\)` = 35.


&gt; The **alternate hypothesis** *(denoted by `\(H_1\)`)* about a parameter states that the value of the parameter **differs** from the value specified by the null hypothesis.

--

There are three types of alternate hypothesis:


&gt; A **left-tailed** alternate hypothesis states that the parameter is *less than* the value specified by the null hypothesis, for example, `\(H_1: \mu &lt; 35\)`


&gt; A **right-tailed** alternate hypothesis states that the parameter is *greater than* the value specified by the null hypothesis, for example, `\(H_1: \mu &gt; 35\)`


&gt; A **two-tailed** alternate hypothesis states that the parameter is *not equal* to the value specified by the null hypothesis, for example, `\(H_1: \mu \neq 35\)`


---

The left-tailed and right-tailed hypotheses are called **one-tailed** hypothesis.

--

We begin a hypothesis test by assuming the null hypothesis is **true**.

--


If the data provide strong evidence against the null hypothesis, we reject it, and believe that alternate hypothesis.

--

If there is not sufficient evidence to reject the null hypothesis, we conclude that the null hypothesis &quot;might&quot; be true, but we never conclude that the null hypothesis is true.



---

###  Error Type I and II

--

Decision | Ho is true | Ho is false
:-----|:-----:|:-----:
Reject Ho | Type I error | Correct
Don&#39;t reject Ho | Correct | Type II error 

--

**Type I error:** The error of rejecting Ho when Ho is true.


&gt; The probability of Type I error is denoted `\(\alpha\)`, the **significance level** of the test.


&gt; `\(\alpha\)` = P(Reject Ho | Ho is true)


--

**Type II error:** The error of failing to reject Ho when Ho is false


&gt; The probability of a Type II error is denoted by `\(\beta\)`


--

The **Power of the test** is the probability of rejecting Ho when Ho is false.


&gt; Power = 1 - `\(\beta\)`


---

**A hypothesis test is like a trial:** In criminal trials in the United States, the jury is always told that the defendant is “innocent until proven guilty” *(Claim)*.


*1)*  What must a member of the jury assume about the defendant at the beginning of the trial?  This is the null hypothesis.

--

&gt; Ho: Defendant is innocent

--

*2)* It is the prosecuting attorney’s job to present evidence to the jury.  IF there is enough evidence (“beyond a reasonable doubt”), then the jury will convict the defendant of the crime.   If the defendant is convicted, the jury is rejecting the null hypothesis (above) and saying the the defendant is .......

--

&gt; `\(H_1\)`: Defendant is guilty

--

*3)* When the jury convicts someone of a crime, their verdict is GUILTY. Is this “Reject Ho”  OR “Fail to Reject Ho”? 

--

&gt; Reject Ho

---


*4)* If the jury fails to convict someone of a crime, their verdict is NOT GUILTY. Is this “Reject Ho”  OR “Fail to Reject Ho”?

--

&gt; Fail to reject Ho

--

*4a)* How does the verdict of “not guilty” differ from “innocent”?

--

&gt; “Not Guilty” indicates that there was not enough evidence to convict the defendant.  This verdict makes no statement about whether or not the defendant committed the crime.

--

&gt; “Innocent” indicates that the defendant did not commit the crime.

--

*5)*  Sometimes the jury makes a correct decision and sometime the jury makes a mistake.


*5a)*  When Ho is true, but we reject it based on the sample evidence, this is an error.  We call it a Type I error.   Write a sentence describing a Type I error in the U.S. criminal justice system.

--

&gt; Type I Error = Guilty Verdict When Defendant Is Innocent

---

*5b)*  When Ho is false, but we fail to reject it based on the sample evidence, this is also an error.  We call it a Type II error.  Write a sentence describing a Type II error in the U.S. criminal justice system.

--

&gt; Type II Error = NOT Guilty Verdict When Defendant is Guilty


---


### The Critical Value Method

--

- The critical value method is based on the idea that we should reject Ho if the value of the test statistic is &quot;unusual&quot; when we assume Ho to be true.

--

- In this method, we choose a **critical value**, which forms a &quot;boundary&quot; between values that are considered unusual and values that are not.

--

- The region that contains the unusual values is called the **critical region**. If the value of the test statistic is **IN** the critical region, we reject Ho.

--

- The critical value we choose depends on how small we believe a probability should be for an event to be considered unusual. In practice, an event with a probability of 0.05 or less is unusual.

--

- The probability that we use to determine whether an event is unusual is called the **significance level**.

--

- If we reject Ho after choosing a significance level `\(\alpha\)`, we say the result is **statistically significant** at the `\(\alpha\)` level.


---


### Table of Critical Values *(for a Z test)*

Significance Level `\(\alpha\)`: | 0.10 | 0.05 | 0.02 | 0.01
:----|:----:|:----:|:----:|:----:
Left-tailed | -1.282 | -1.645 | -2.054 | -2.326
Right-tailed | 1.282 | 1.645 | 2.054 | 2.326
Two-tailed | `\(\pm\)` 1.645 | `\(\pm\)` 1.96 | `\(\pm\)` 2.326 | `\(\pm\)` 2.576


--

A test is made of Ho: `\(\mu\)` = 1 versus `\(H_1\)`: `\(\mu\)` &gt; 1. The value of the test statistic is Z = 1.85.


*a)* Is Ho rejected at the `\(\alpha\)` = 0.05 level?

--

- The alternative hypothesis is `\(H_1\)`: `\(\mu\)` &gt; 1, so it is tight-tailed test.

--

- The critical value for `\(\alpha\)`=0.05 is `\(z_{\alpha}\)`=1.645. For the right-tailed test, we reject Ho if z `\(\geq\)` `\(z_{\alpha}\)`. Because 1.85 &gt; 1.645, we reject Ho at the `\(\alpha\)` = 0.05 level.


---

*b)* If Ho rejected at the `\(\alpha\)` = 0.01 level?

--

- The critical value for `\(\alpha\)` = 0.01 is 2.326. 

--

- Since 1.85 &lt; 2.326, we do not reject Ho at the `\(\alpha\)` = 0.01 level.


---

### The P-Value Method

--

Whereas the critical value method tells us only whether the test statistic was unusual or not, the P-value method tells us **exactly** how unusual the test statistic is. For this reason, the P-value method is the more often used in practice.

--

- The P-value is the **probability**, assuming that Ho is true, of observing a value for the test statistic that is as extreme as or more extreme than the value actually observed.


- The smaller the P-value, the stronger the evidence against Ho.

--

**Caution:** The P-value is NOT the probability that the null hypothesis is true.

--

To make a decision whether to reject Ho when using the P-value method:


- If P-value `\(\leq \alpha\)`, reject Ho. If P-value &gt; `\(\alpha\)`, do not reject Ho.


- If P-value `\(\leq \alpha\)`, we say that Ho is rejected at the `\(\alpha\)` level, or that the result is statistically significant at the `\(\alpha\)` level.


---

Which provides stronger evidence against Ho: a P-value of 0.05 or a P-value of 0.50?

--

- &lt;p&gt; The P-value of  0.05 &lt;/p&gt;

--

A test is made of Ho: `\(\mu\)` = 30 versus `\(H_1\)`: `\(\mu\)` &lt; 30. The test statistic is z = -1.28. Find and interpret the P-value.

--

- Using ALEKS calculator: P(Z `\(\leq\)` -1.28)

--

- The answer is 0.1003

--

- If Ho is true, then the probability of observing a test statistic less than of equal to the value we actually observed *(-1.28)* is 0.1003.

--

- This result is not very unusual, so the evidence against Ho is not strong.


--

**Observation**: Since the alternative in this example is left-tailed, the ALEKS calculator function works well. However, you have to do 1 - P(Z `\(\leq\)` `\(_\)`) if the alternative is right-tailed and 2*P(Z `\(\leq\)` -z)* for the two-tailed test.
